buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Repo Maven Tuya — bắt buộc ở phạm vi resolve của :app: transitive dep
// `com.thingclips.smart:thingsmart` (do lib `api`) KHÔNG kế thừa repositories của lib module;
// :app phải tự khai. settings.gradle không có dependencyResolutionManagement → PREFER_PROJECT,
// nên allprojects.repositories được dùng (không xung đột FAIL_ON_PROJECT_REPOS).
allprojects {
    repositories {
        maven { url "https://maven-other.tuya.com/repository/maven-releases/" }
        maven { url "https://maven-other.tuya.com/repository/maven-commercial-releases/" }
    }
}
