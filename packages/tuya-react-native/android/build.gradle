buildscript {
  ext.TurboTuya = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return TurboTuya[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.jimmyvu.turbotuya"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    consumerProguardFiles "proguard-rules.pro"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

repositories {
  google()
  mavenCentral()
  // Repo Maven của Tuya (bắt buộc để resolve thingsmart)
  maven { url "https://maven-other.tuya.com/repository/maven-releases/" }
  maven { url "https://maven-other.tuya.com/repository/maven-commercial-releases/" }
  // fastjson bản `*.android` nằm ở Aliyun public (không có trên mavenCentral).
  maven { url "https://maven.aliyun.com/repository/public" }
}

// Tuya `thingsmart` kéo theo `thingsmart-modularCampAnno:1.0.0-SNAPSHOT` (chỉ có bản SNAPSHOT,
// không publish ở maven-releases) → loại trừ ở chính module thư viện để MỌI variant (debug/release,
// kể cả lint releaseRuntimeClasspath) đều resolve được - theo đúng hướng dẫn tích hợp Tuya.
configurations.all {
  exclude group: "com.thingclips.smart", module: "thingsmart-modularCampAnno"
}

dependencies {
  implementation "com.facebook.react:react-android"
  // Tuya Smart Life App SDK (Wi-Fi + BLE). `api` để app tiêu thụ thấy được.
  api "com.thingclips.smart:thingsmart:7.5.6"
  // Dependency runtime BẮT BUỘC của Tuya SDK (theo hướng dẫn tích hợp chính thức) -
  // thiếu sẽ NoClassDefFoundError lúc ThingHomeSdk.init() dù compile vẫn qua.
  api "com.alibaba:fastjson:1.1.67.android"
  api "com.squareup.okhttp3:okhttp-urlconnection:3.14.9"
  // LƯU Ý: file bảo mật `security-algorithm.aar` KHÔNG ở đây - app tiêu thụ
  // (example / apps/mobile) phải đặt vào `app/libs/` (xem README.md).
}
